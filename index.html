<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Chess</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #16213e;
            color: #e8e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 24px;
            background: rgba(0, 0, 0, 0.45);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            z-index: 10;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, #f5d08c, #c8922a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #status {
            font-size: 1rem;
            font-weight: 600;
            padding: 7px 18px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid transparent;
            min-width: 180px;
            text-align: center;
            transition: background 0.25s, border-color 0.25s, color 0.25s;
        }
        #status.white-turn  { border-color: #c8b87a; color: #f5e8b0; }
        #status.black-turn  { border-color: #6677aa; color: #aab4d8; }
        #status.check       { background: rgba(200, 40, 40, 0.35); border-color: #e04444; color: #ffaaaa; }
        #status.game-over   { background: rgba(40, 180, 80, 0.3); border-color: #44cc77; color: #aaffcc; }

        #reset-btn {
            padding: 8px 20px;
            border-radius: 20px;
            background: linear-gradient(135deg, #f5d08c, #c8922a);
            color: #1a1200;
            font-weight: 700;
            font-size: 0.88rem;
            border: none;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: opacity 0.18s, transform 0.1s;
        }
        #reset-btn:hover { opacity: 0.85; transform: scale(1.03); }
        #reset-btn:active { transform: scale(0.97); }

        #canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        canvas { display: block; }

        #hint {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.55);
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 0.76rem;
            color: rgba(255, 255, 255, 0.45);
            pointer-events: none;
            white-space: nowrap;
        }

        #captured-panel {
            position: absolute;
            top: 10px;
            right: 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #move-counter {
            position: absolute;
            top: 14px;
            left: 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: rgba(0, 0, 0, 0.55);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.85);
            pointer-events: none;
            min-width: 130px;
        }
        #move-counter .label {
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 2px;
        }
        #move-counter .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        #move-counter .name { font-weight: 600; }
        #move-counter .count { font-variant-numeric: tabular-nums; font-weight: 700; }
        #move-counter .white .name { color: #f5e8b0; }
        #move-counter .black .name { color: #aab4d8; }

        #move-history {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(0, 0, 0, 0.55);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.85);
            width: 240px;
            max-height: calc(100% - 28px);
            display: flex;
            flex-direction: column;
        }
        #move-history .label {
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 6px;
        }
        #move-history .columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            overflow-y: auto;
            font-variant-numeric: tabular-nums;
        }
        #move-history .col-title {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            margin-bottom: 4px;
        }
        #move-history .white .col-title { color: #f5e8b0; }
        #move-history .black .col-title { color: #aab4d8; }
        #move-history ol {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        #move-history li {
            display: flex;
            gap: 6px;
            font-size: 0.82rem;
        }
        #move-history li .num {
            color: rgba(255, 255, 255, 0.4);
            min-width: 1.6em;
            text-align: right;
        }
        #move-history .empty {
            font-style: italic;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.78rem;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>3D Chess</h1>
        <div id="status" class="white-turn">White's Turn</div>
        <button id="reset-btn">New Game</button>
    </div>
    <div id="canvas-container">
        <canvas id="chess-canvas"></canvas>
        <div id="move-counter" aria-live="polite">
            <div class="label">Moves</div>
            <div class="row white"><span class="name">White</span><span class="count" id="white-move-count">0</span></div>
            <div class="row black"><span class="name">Black</span><span class="count" id="black-move-count">0</span></div>
        </div>
        <div id="move-history" aria-live="polite">
            <div class="label">Move History</div>
            <div class="columns">
                <div class="white">
                    <div class="col-title">White</div>
                    <ol id="white-move-list"></ol>
                </div>
                <div class="black">
                    <div class="col-title">Black</div>
                    <ol id="black-move-list"></ol>
                </div>
            </div>
        </div>
        <div id="hint">Click to select &amp; move &nbsp;·&nbsp; Left-drag to orbit &nbsp;·&nbsp; Scroll to zoom</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="src/chess.js"></script>
    <script src="src/app.js"></script>
</body>
</html>
